<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#05070D" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Naveen V | Full Stack Developer</title>
    <meta name="description" content="Naveen V — Full Stack Developer building AI-powered web applications with React, Node.js and modern web technologies. View projects, resume and contact details." />

    <meta property="og:site_name" content="Naveen V | Full Stack Developer" />
    <meta property="og:title" content="Naveen V | Full Stack Developer" />

    <meta property="og:url" content="https://naveenv-portfolio.vercel.app/" />
    <meta property="og:image" content="https://naveenv-portfolio.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Naveen V | Full Stack Developer" />
    <meta name="twitter:description" content="Building AI-powered web applications. Explore projects, skills and resume." />
    <meta name="twitter:image" content="https://naveenv-portfolio.vercel.app/og-image.png" />

    <!-- Fonts: Space Grotesk (display), Inter (body), JetBrains Mono (utility) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
